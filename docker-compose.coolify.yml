services:
  prospectos:
    build:
      context: .
      dockerfile: backend/Dockerfile
    platform: linux/amd64 # o binário do scraper (gosom) só tem build linux-amd64
    env_file: .env
    environment:
      PROSPECTOS_DATA_DIR: /data
    volumes:
      - prospectos-data:/data # leads.db, backups, saidas, logs, instagram/sessao
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy # Caddyfile embutido na imagem, sem bind mount (ver Dockerfile.proxy)
    depends_on:
      prospectos:
        condition: service_healthy
    env_file: .env
    expose:
      - "8080" # aponte o domínio no Coolify pra este serviço/porta, não pro "prospectos"
    restart: unless-stopped

volumes:
  prospectos-data:
